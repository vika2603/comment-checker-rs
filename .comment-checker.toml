  "^Override the minijinja template",
  "^Suppress non-essential output",
  "^Install the comment-checker hook",
  "^Remove a previously installed",
  "^Download tree-sitter parser grammars",
  "^Language identifiers to fetch",
  "^Host tool that comment-checker",

